<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>2026世界杯 · 动态赛程 & AI实时比分</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b1e2f 0%, #0d2a3f 100%);
            min-height: 100vh;
            padding: 1.8rem 1.5rem;
            color: #f0f6fc;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #94b8d9;
            background: rgba(255,255,255,0.08);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            margin-left: 0.5rem;
        }
        .live-indicator {
            background: #e63946;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
            margin-right: 6px;
        }
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(0.9); }
        }
        .subhead {
            margin: 0.5rem 0 1.8rem 0;
            color: #b6d0e8;
            font-weight: 300;
            border-left: 3px solid #3b9eff;
            padding-left: 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .status-bar {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.25);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            align-items: center;
        }
        .date-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.2rem;
        }
        .date-badge {
            background: rgba(59, 158, 255, 0.2);
            backdrop-filter: blur(2px);
            padding: 0.25rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            border: 1px solid rgba(59, 158, 255, 0.3);
            color: #cfdef5;
            cursor: default;
        }
        .date-badge.active {
            background: #3b9eff;
            color: #0b1e2f;
            border-color: #3b9eff;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(59,158,255,0.4);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 920px) {
            .grid {
                grid-template-columns: 1fr 1.1fr;
            }
        }
        .card {
            background: rgba(20, 40, 58, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1.6rem 1.3rem;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 0.7rem;
        }
        .card-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-header .badge {
            background: #1f3b55;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #b6d0e8;
        }
        .match-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .match-item {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 0.9rem 1.1rem;
            transition: 0.15s;
            border-left: 3px solid #3b9eff;
            position: relative;
        }
        .match-item.live {
            border-left-color: #e63946;
            background: rgba(230, 57, 70, 0.07);
        }
        .match-item.finished {
            border-left-color: #52b788;
            opacity: 0.8;
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: #9bb7d9;
            margin-bottom: 0.3rem;
            letter-spacing: 0.3px;
        }
        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 0.2rem;
            flex-wrap: wrap;
        }
        .team {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .flag {
            display: inline-block;
            width: 22px;
            text-align: center;
            font-size: 1.2rem;
        }
        .vs {
            color: #7997b5;
            font-weight: 300;
            font-size: 0.85rem;
        }
        .score {
            font-weight: 700;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.3);
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            letter-spacing: 1px;
        }
        .live-tag {
            background: #e63946;
            color: white;
            font-size: 0.6rem;
            padding: 0.15rem 0.6rem;
            border-radius: 30px;
            text-transform: uppercase;
            margin-left: 6px;
            animation: pulse 1.2s infinite;
        }
        .ai-predictions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 0.8rem;
            margin-top: 0.6rem;
            padding-top: 0.5rem;
            border-top: 1px dashed rgba(255,255,255,0.06);
        }
        .ai-item {
            background: rgba(59, 158, 255, 0.12);
            border-radius: 40px;
            padding: 0.2rem 0.7rem;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #d2e5ff;
        }
        .ai-item strong {
            color: white;
            font-weight: 600;
            margin-left: 2px;
        }
        .ai-label {
            color: #85b1db;
            font-size: 0.65rem;
            text-transform: uppercase;
        }
        .footer-note {
            margin-top: 2.8rem;
            text-align: center;
            font-size: 0.7rem;
            color: #5e7c9b;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1.8rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .refresh-tip {
            background: rgba(59,158,255,0.08);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="container">
    <header style="display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center;">
        <h1>
            ⚽ 2026 世界杯 · 实时
            <small>动态比分 + AI 建议</small>
        </h1>
        <div class="status-bar">
            <span><span class="live-indicator"></span> 直播中</span>
            <span>🔄 自动更新 15s</span>
        </div>
    </header>
    <div class="subhead">
        <span>📅 基于设备系统日期 • 实时更新</span>
        <div class="date-nav" id="dateNavContainer">
            <!-- 动态生成 今天/明天/后天 -->
        </div>
    </div>

    <div class="grid">
        <!-- 左栏：全部比赛 -->
        <div class="card">
            <div class="card-header">
                <h2><span class="live-indicator" style="width:10px;height:10px;"></span> 赛程 · 近3天</h2>
                <span class="badge" id="matchCount">0 场</span>
            </div>
            <div class="match-list" id="allMatchesContainer">
                <!-- 动态渲染 -->
            </div>
        </div>

        <!-- 右栏：AI 比分建议 -->
        <div class="card">
            <div class="card-header">
                <h2>🤖 AI 多模型预测</h2>
                <span class="badge">基于实时状态</span>
            </div>
            <div class="match-list" id="aiSuggestionsContainer">
                <!-- 动态渲染 -->
            </div>
        </div>
    </div>
    <div class="footer-note">
        <span>⚡ 模拟2026世界杯 · 动态刷新比分 & AI预测 (每15秒)</span>
        <span class="refresh-tip">上次更新: <span id="lastUpdateTime">--</span></span>
    </div>
</div>
<script>
    (function() {
        // ----- 获取真实的今日日期 (YYYY-MM-DD) -----
        function getTodayString() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getDatePlusDays(baseDate, days) {
            const d = new Date(baseDate);
            d.setDate(d.getDate() + days);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 自动计算今日/明日/后日
        const todayString = getTodayString();
        const tomorrowString = getDatePlusDays(todayString, 1);
        const dayAfterString = getDatePlusDays(todayString, 2);

        // 球队旗子映射
        const flags = {
            "巴西": "🇧🇷", "德国": "🇩🇪", "阿根廷": "🇦🇷", "法国": "🇫🇷",
            "英格兰": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "葡萄牙": "🇵🇹", "西班牙": "🇪🇸", "荷兰": "🇳🇱",
            "乌拉圭": "🇺🇾", "克罗地亚": "🇭🇷", "摩洛哥": "🇲🇦", "日本": "🇯🇵",
            "韩国": "🇰🇷", "沙特": "🇸🇦", "澳大利亚": "🇦🇺", "加拿大": "🇨🇦",
            "墨西哥": "🇲🇽", "美国": "🇺🇸", "厄瓜多尔": "🇪🇨", "丹麦": "🇩🇰",
            "瑞士": "🇨🇭", "塞内加尔": "🇸🇳", "波兰": "🇵🇱", "喀麦隆": "🇨🇲",
            "加纳": "🇬🇭", "塞尔维亚": "🇷🇸", "伊朗": "🇮🇷", "突尼斯": "🇹🇳",
            "威尔士": "🏴󠁧󠁢󠁷󠁬󠁳󠁿", "哥斯达黎加": "🇨🇷", "意大利": "🇮🇹", "比利时": "🇧🇪"
        };
        const defaultFlag = "🏳️";

        // 基础比赛定义 (基于真实日期)
        const baseMatches = [
            { id: 'm1', date: todayString, time: "18:00", team1: "巴西", team2: "德国", stage: "小组赛 A组" },
            { id: 'm2', date: todayString, time: "21:00", team1: "阿根廷", team2: "法国", stage: "小组赛 B组" },
            { id: 'm3', date: todayString, time: "23:30", team1: "英格兰", team2: "葡萄牙", stage: "小组赛 C组" },
            { id: 'm4', date: tomorrowString, time: "17:00", team1: "荷兰", team2: "西班牙", stage: "小组赛 D组" },
            { id: 'm5', date: tomorrowString, time: "20:00", team1: "乌拉圭", team2: "克罗地亚", stage: "小组赛 E组" },
            { id: 'm6', date: tomorrowString, time: "22:30", team1: "意大利", team2: "比利时", stage: "小组赛 F组" },
            { id: 'm7', date: dayAfterString, time: "16:30", team1: "日本", team2: "韩国", stage: "小组赛 G组" },
            { id: 'm8', date: dayAfterString, time: "19:00", team1: "美国", team2: "墨西哥", stage: "小组赛 H组" },
            { id: 'm9', date: dayAfterString, time: "21:30", team1: "摩洛哥", team2: "塞内加尔", stage: "小组赛 I组" }
        ];

        // 模拟AI预测 (固定)
        const aiPredictions = [
            { matchKey: "巴西-德国", team1: "巴西", team2: "德国", predictions: [
                { model: "ChatGPT", score: "2:1" }, { model: "Claude", score: "1:1" }, { model: "Grok", score: "3:2" }, { model: "Gemini", score: "2:0" }
            ]},
            { matchKey: "阿根廷-法国", team1: "阿根廷", team2: "法国", predictions: [
                { model: "ChatGPT", score: "1:2" }, { model: "Claude", score: "2:2" }, { model: "Grok", score: "1:1" }, { model: "Gemini", score: "2:1" }
            ]},
            { matchKey: "荷兰-西班牙", team1: "荷兰", team2: "西班牙", predictions: [
                { model: "ChatGPT", score: "2:1" }, { model: "Claude", score: "1:1" }, { model: "Grok", score: "0:2" }, { model: "Gemini", score: "1:2" }
            ]},
            { matchKey: "日本-韩国", team1: "日本", team2: "韩国", predictions: [
                { model: "ChatGPT", score: "1:0" }, { model: "Claude", score: "2:1" }, { model: "Grok", score: "1:1" }, { model: "Gemini", score: "0:0" }
            ]},
            { matchKey: "美国-墨西哥", team1: "美国", team2: "墨西哥", predictions: [
                { model: "ChatGPT", score: "2:2" }, { model: "Claude", score: "1:0" }, { model: "Grok", score: "3:1" }, { model: "Gemini", score: "2:1" }
            ]}
        ];

        // ----- 状态: 比分 & 模拟状态 -----
        let matchStates = {};

        function initMatchStates() {
            baseMatches.forEach(m => {
                const s1 = Math.floor(Math.random() * 4);
                const s2 = Math.floor(Math.random() * 4);
                let status = 'scheduled';
                // 今天比赛模拟 live 或 finished
                if (m.date === todayString) {
                    status = Math.random() > 0.4 ? 'live' : 'finished';
                } else {
                    status = 'scheduled';
                }
                matchStates[m.id] = { score1: s1, score2: s2, status };
            });
            // 保证至少2场live
            if (matchStates['m1']) { matchStates['m1'].status = 'live'; matchStates['m1'].score1 = 1; matchStates['m1'].score2 = 1; }
            if (matchStates['m2']) { matchStates['m2'].status = 'live'; matchStates['m2'].score1 = 2; matchStates['m2'].score2 = 2; }
        }
        initMatchStates();

        // 模拟实时变化
        function simulateLiveUpdates() {
            baseMatches.forEach(m => {
                const state = matchStates[m.id];
                if (state.status === 'live') {
                    let delta1 = Math.random() > 0.7 ? 1 : 0;
                    let delta2 = Math.random() > 0.7 ? 1 : 0;
                    if (Math.random() > 0.85) delta1 = -1;
                    if (Math.random() > 0.85) delta2 = -1;
                    state.score1 = Math.max(0, Math.min(5, state.score1 + delta1));
                    state.score2 = Math.max(0, Math.min(5, state.score2 + delta2));
                }
                // 极小概率 scheduled -> live
                if (state.status === 'scheduled' && Math.random() > 0.95) {
                    state.status = 'live';
                }
                // live -> finished
                if (state.status === 'live' && Math.random() > 0.9) {
                    state.status = 'finished';
                }
            });
            let liveCount = baseMatches.filter(m => matchStates[m.id].status === 'live').length;
            if (liveCount < 2) {
                const scheduled = baseMatches.filter(m => matchStates[m.id].status === 'scheduled');
                if (scheduled.length > 0) {
                    const idx = Math.floor(Math.random() * scheduled.length);
                    matchStates[scheduled[idx].id].status = 'live';
                }
            }
        }

        function getFlag(team) {
            return flags[team] || defaultFlag;
        }

        // 格式化日期显示
        function formatDateLabel(dateStr) {
            const d = new Date(dateStr);
            const month = d.getMonth() + 1;
            const day = d.getDate();
            if (dateStr === todayString) return `今日 · ${month}月${day}日`;
            if (dateStr === tomorrowString) return `明日 · ${month}月${day}日`;
            return `后日 · ${month}月${day}日`;
        }

        // 渲染全部比赛
        function renderAllMatches() {
            const container = document.getElementById('allMatchesContainer');
            let html = '';
            const todayMatches = baseMatches.filter(m => m.date === todayString);
            const tomorrowMatches = baseMatches.filter(m => m.date === tomorrowString);
            const dayAfterMatches = baseMatches.filter(m => m.date === dayAfterString);

            function renderGroup(dateLabel, matchArray) {
                if (matchArray.length === 0) return '';
                let groupHtml = `<div style="margin: 0.8rem 0 0.3rem 0; display: flex; align-items: center; gap: 0.3rem; font-size: 0.9rem; color: #b6d0e8;">📆 ${dateLabel}</div>`;
                matchArray.forEach(m => {
                    const state = matchStates[m.id];
                    const isLive = state.status === 'live';
                    const isFinished = state.status === 'finished';
                    let scoreDisplay = '';
                    let liveTag = '';
                    if (isLive) {
                        scoreDisplay = `<span class="score">${state.score1} : ${state.score2}</span>`;
                        liveTag = `<span class="live-tag">● LIVE</span>`;
                    } else if (isFinished) {
                        scoreDisplay = `<span class="score" style="background:rgba(82,183,136,0.2);">${state.score1} : ${state.score2}</span>`;
                    } else {
                        scoreDisplay = `<span style="color:#6e8fb0; font-size:0.9rem;">vs</span>`;
                    }
                    const extraClass = isLive ? 'live' : (isFinished ? 'finished' : '');

                    groupHtml += `
                        <div class="match-item ${extraClass}">
                            <div class="match-header">
                                <span>${m.stage}</span>
                                <span>⏱ ${m.time} ${isLive ? liveTag : ''}</span>
                            </div>
                            <div class="match-teams">
                                <span class="team"><span class="flag">${getFlag(m.team1)}</span> ${m.team1}</span>
                                ${scoreDisplay}
                                <span class="team">${m.team2} <span class="flag">${getFlag(m.team2)}</span></span>
                            </div>
                            <div style="font-size:0.65rem; color:#6e8fb0; margin-top: 0.1rem;">
                                ${isLive ? '⚡ 进行中' : (isFinished ? '✅ 已结束' : '⏳ 未开始')}
                            </div>
                        </div>
                    `;
                });
                return groupHtml;
            }

            html += renderGroup(formatDateLabel(todayString), todayMatches);
            html += renderGroup(formatDateLabel(tomorrowString), tomorrowMatches);
            html += renderGroup(formatDateLabel(dayAfterString), dayAfterMatches);
            if (!html) html = `<div class="no-matches">⚽ 暂无安排比赛</div>`;
            container.innerHTML = html;
            document.getElementById('matchCount').innerText = baseMatches.length + ' 场';
        }

        // 渲染AI预测
        function renderAiSuggestions() {
            const container = document.getElementById('aiSuggestionsContainer');
            let html = '';
            aiPredictions.forEach(item => {
                const match = baseMatches.find(m => m.team1 === item.team1 && m.team2 === item.team2);
                let state = null;
                let isLive = false, isFinished = false;
                let realScore = '';
                if (match && matchStates[match.id]) {
                    state = matchStates[match.id];
                    isLive = state.status === 'live';
                    isFinished = state.status === 'finished';
                    if (isLive || isFinished) {
                        realScore = ` ${state.score1}:${state.score2}`;
                    } else {
                        realScore = '';
                    }
                }
                const date = match ? match.date : '';
                let dateLabel = '';
                if (date === todayString) dateLabel = '今日';
                else if (date === tomorrowString) dateLabel = '明日';
                else if (date === dayAfterString) dateLabel = '后日';
                else dateLabel = date;
                const statusIcon = isLive ? '🔴' : (isFinished ? '✅' : '⏳');

                html += `
                    <div class="match-item ${isLive ? 'live' : ''}" style="border-left-color: #7b68ee;">
                        <div class="match-header">
                            <span>${dateLabel} · ${item.team1} vs ${item.team2} ${statusIcon}</span>
                            <span>🤖 多模型</span>
                        </div>
                        <div class="match-teams" style="margin-bottom: 0.2rem; font-size:1rem;">
                            <span class="team"><span class="flag">${getFlag(item.team1)}</span> ${item.team1}</span>
                            <span class="vs">${ (isLive || isFinished) ? realScore : 'vs' }</span>
                            <span class="team">${item.team2} <span class="flag">${getFlag(item.team2)}</span></span>
                        </div>
                        <div class="ai-predictions">
                            ${item.predictions.map(p => `
                                <span class="ai-item"><span class="ai-label">${p.model}</span> <strong>${p.score}</strong></span>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 更新日期导航
        function renderDateNav() {
            const container = document.getElementById('dateNavContainer');
            const dates = [
                { label: `今日 ${new Date(todayString).getDate()}日`, value: todayString },
                { label: `明日 ${new Date(tomorrowString).getDate()}日`, value: tomorrowString },
                { label: `后日 ${new Date(dayAfterString).getDate()}日`, value: dayAfterString }
            ];
            container.innerHTML = dates.map((d, idx) => {
                const active = idx === 0 ? ' active' : '';
                return `<span class="date-badge${active}">📆 ${d.label}</span>`;
            }).join('');
        }

        function updateUI() {
            renderAllMatches();
            renderAiSuggestions();
            renderDateNav();
            document.getElementById('lastUpdateTime').innerText = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        }

        // 定时更新: 模拟实时比分 & 刷新UI
        setInterval(() => {
            simulateLiveUpdates();
            updateUI();
        }, 15000);

        // 初次渲染
        updateUI();
    })();
</script>
</body>
</html>
